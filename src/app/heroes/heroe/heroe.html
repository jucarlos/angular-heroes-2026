<h3>Mi héroe preferido: {{ name }} </h3>

<dl>
  <td>Nombre</td>
  <dd>{{ name }}</dd>

  <td>Edad</td>
  <dd>{{ age }}</dd>

  <td>Método que devuelva todo el detalle del héroe</td>
  <dd>{{ getHeroeDesciption() }}</dd>

  <td>Getter nombre mayúsculas</td>
  <dd>{{ capitalizedName }}</dd>


</dl>


<button
        *ngIf="name != 'Spiderman'"
        (click)="changeName()"
        class="btn btn-primary mx-2">Cambiar nombre</button>

<button *ngIf="age != 20"
        (click)="changeAge()"
        class="btn btn-primary mx-2">Cambiar edad</button>

<button
      (click)="reset()"
      class="btn btn-primary">Reset</button>
